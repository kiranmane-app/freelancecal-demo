<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FreelanceCal · phone v26 · crisp 1px pixel outline (multi-shadow)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F7F6;
    --ink: #1A1815;
    --ink-soft: rgba(26, 24, 21, 0.6);
    --ink-faint: rgba(26, 24, 21, 0.4);
    --card: #FFFFFF;
    --divider: rgba(26, 24, 21, 0.1);
    --cal-fill: #F7F7F6;
    --cal-stroke: #1A1815;
    --phone-frame: #1A1815;
    --notch: #1A1815;
    --splash: #E94E77;
    --r1: #E94E77; --r2: #F59E0B; --r3: #FBBF24;
    --r4: #10B981; --r5: #0EA5E9; --r6: #8B5CF6;

    /* Scale factor — inner scene is designed at 1, scaled via this var */
    --scene-scale: 1;
  }

  /* Dark-mode wordmark — same pixel outline approach, light colour. */
  :root[data-theme="dark"] .splash-wordmark {
    text-shadow:
      -1px -1px 0 #FFFFFF,
       1px -1px 0 #FFFFFF,
      -1px  1px 0 #FFFFFF,
       1px  1px 0 #FFFFFF,
       0px -1px 0 #FFFFFF,
       0px  1px 0 #FFFFFF,
      -1px  0px 0 #FFFFFF,
       1px  0px 0 #FFFFFF;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .splash-wordmark {
      text-shadow:
        -1px -1px 0 #FFFFFF,
         1px -1px 0 #FFFFFF,
        -1px  1px 0 #FFFFFF,
         1px  1px 0 #FFFFFF,
         0px -1px 0 #FFFFFF,
         0px  1px 0 #FFFFFF,
        -1px  0px 0 #FFFFFF,
         1px  0px 0 #FFFFFF;
    }
  }

  :root[data-theme="dark"] {
    --bg: #26262A;
    --ink: #FFFFFF;
    --ink-soft: rgba(255, 255, 255, 0.78);
    --ink-faint: rgba(255, 255, 255, 0.55);
    --card: #1F1F23;
    --divider: rgba(255, 255, 255, 0.1);
    --cal-fill: #26262A;
    --cal-stroke: #FFFFFF;
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #26262A;
      --ink: #FFFFFF;
      --ink-soft: rgba(255, 255, 255, 0.78);
      --ink-faint: rgba(255, 255, 255, 0.55);
      --card: #1F1F23;
      --divider: rgba(255, 255, 255, 0.1);
      --cal-fill: #26262A;
      --cal-stroke: #FFFFFF;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Lexend', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .top-bar {
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
    gap: 8px;
  }
  .top-bar .title {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .controls { display: flex; gap: 8px; }
  .btn {
    background: var(--ink); color: var(--bg);
    border: none; padding: 8px 14px; border-radius: 20px;
    font-family: 'Lexend'; font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
  }
  .btn-ghost {
    background: transparent; color: var(--ink);
    border: 1.5px solid var(--divider);
  }

  .phone-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    min-height: 0;
  }

  /* Phone — fixed internal dimensions, but scaled via --scene-scale to fit viewport */
  .phone {
    width: 390px;
    height: 760px;
    background: var(--bg);
    border: 12px solid var(--phone-frame);
    border-radius: 48px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18);
    transform: scale(var(--scene-scale));
    transform-origin: center center;
    flex-shrink: 0;
  }
  .notch {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 24px;
    background: var(--notch);
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    z-index: 10;
  }

  .scene { position: absolute; inset: 0; overflow: hidden; }

  /* ===== SPLASH ===== */
  .splash-curtain {
    position: absolute; inset: 0;
    background: var(--bg);  /* b/w inverse with light/dark mode */
    z-index: 8;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 14px 120px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .splash-content {
    text-align: center;
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%;
  }
  .splash-wordmark {
    font-family: 'Fredericka the Great', serif;
    font-size: 56px;
    color: var(--r1);  /* starts at first rainbow colour, cycled by rainbow-text */
    opacity: 0;
    line-height: 1;
    /* Crisp 1px pixel outline — eight 1px sharp text-shadows simulate a clean border around
       every letter. Never scribbles (no blur), always visible. Light-mode default: dark outline. */
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #1A1815,
       1px -1px 0 #1A1815,
      -1px  1px 0 #1A1815,
       1px  1px 0 #1A1815,
       0px -1px 0 #1A1815,
       0px  1px 0 #1A1815,
      -1px  0px 0 #1A1815,
       1px  0px 0 #1A1815;
    animation: soft-in 0.8s ease-out 0.6s forwards,
               rainbow-text 6s linear 1.4s infinite;
  }
  .splash-tagline {
    margin-top: 32px;  /* was 18px — more breathing room under the wordmark */
    font-family: 'Lexend';
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);  /* inverse — dark on light, white on dark */
    letter-spacing: 0.02em;
    white-space: nowrap;
    opacity: 0;
    animation: fade-in 0.4s 1.2s forwards;
  }
  .splash-type {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    width: 0;
    vertical-align: middle;
    animation: type-splash 1.5s steps(16, end) 1.4s forwards;
  }
  @keyframes type-splash { 0% { width: 0; } 100% { width: 16ch; } }

  .splash-tagline .fun-heart {
    display: inline-block;
    font-family: 'Fredericka the Great', serif;
    font-size: 32px;
    color: var(--r1);  /* rainbow-cycle keeps "Fun." lively across modes */
    margin-left: 4px;
    vertical-align: middle;
    transform-origin: center;
    opacity: 0;
    animation: fade-in 0.4s 3.0s forwards,
               heartbeat 3.6s ease-in-out 3.6s infinite,
               rainbow-text 6s linear 3.6s infinite;
  }

  /* Intro line — FONT INVERSION: "Four steps. Zero" in Fredericka (playful); "stress" in boring Lexend (the thing being cancelled). */
  .splash-intro {
    margin-top: 48px;
    font-family: 'Fredericka the Great', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 0;
    opacity: 0;
    animation: fade-in 0.6s 3.4s forwards;
  }
  .splash-intro .stress {
    font-family: 'Lexend', sans-serif;
    font-size: 17px;          /* bumped to visually match 22px Fredericka */
    font-weight: 500;
    letter-spacing: 0.03em;
    margin-left: 6px;
    vertical-align: baseline;  /* on same baseline as "Four steps. Zero", no lift */
    position: relative;
    display: inline-block;
  }
  /* Hand-drawn pen strike — TWO overlapping curved SVG strokes drawing in like a real scribble cancel. */
  .splash-intro .strike-svg {
    position: absolute;
    left: -6px;
    right: -6px;
    top: -2px;
    width: calc(100% + 12px);
    height: 120%;
    overflow: visible;
    pointer-events: none;
  }
  .splash-intro .strike-svg path {
    fill: none;
    stroke: #E40303;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 240;
    stroke-dashoffset: 240;
  }
  .splash-intro .strike-svg .stroke-1 {
    animation: strike-pen 0.4s cubic-bezier(0.4, 0, 0.6, 1) 4.4s forwards;
  }
  .splash-intro .strike-svg .stroke-2 {
    animation: strike-pen 0.38s cubic-bezier(0.4, 0, 0.6, 1) 4.75s forwards;
  }
  .splash-intro .strike-svg .stroke-3 {
    animation: strike-pen 0.36s cubic-bezier(0.4, 0, 0.6, 1) 5.05s forwards;
  }
  @keyframes strike-pen {
    to { stroke-dashoffset: 0; }
  }
  @keyframes soft-in {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }
  @keyframes fade-in { to { opacity: 1; } }

  .splash-cta {
    position: relative;
    z-index: 11;
    font-family: 'Lexend';
    font-size: 14px;
    font-weight: 500;
    color: var(--bg);           /* inverse of bg — light text on dark pill (or vice versa) */
    background: var(--ink);     /* inverse pill — dark on light mode, white on dark mode */
    padding: 12px 28px;
    border-radius: 24px;
    border: none;
    letter-spacing: 0.04em;
    white-space: nowrap;
    cursor: pointer;
    pointer-events: auto;
    opacity: 0;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    animation: splash-cta-in 0.6s ease-out 4.0s forwards,
               splash-cta-pulse 3s ease-in-out 5.0s infinite;
    transition: transform 0.15s ease;
  }
  .splash-cta:active { transform: scale(0.94); }
  @keyframes splash-cta-in {
    0%   { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes splash-cta-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.05); }
  }

  /* Curtain slides up when scene starts (restored from v49) */
  .scene.started .splash-curtain {
    animation: curtain-up 3.5s cubic-bezier(0.55, 0, 0.35, 1) 0s forwards;
    pointer-events: none;
  }
  @keyframes curtain-up {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-120%); }
  }

  /* ===== POST-SPLASH FLEX LAYOUT — no overlap, things flow vertically ===== */
  .scene-body {
    position: absolute;
    inset: 88px 20px 36px 20px;  /* lowered from 40px — more breathing room at top */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    z-index: 4;
    pointer-events: none;
  }

  /* Speech zone — top region */
  .speech-zone {
    width: 100%;
    text-align: center;
    flex-shrink: 0;
    min-height: 0;
  }
  .speech-line {
    display: block;
    font-family: 'Fredericka the Great', serif;
    opacity: 0;
    letter-spacing: 0.01em;
    transform-origin: center;
    transform: translateY(260px) scale(0.18);
    line-height: 1.05;
    /* Shadow pattern from landing page — subtle dark, for depth in light mode */
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  :root[data-theme="dark"] .speech-line,
  :root:not([data-theme="light"]) .speech-line {
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .speech-line.one {
    font-size: 42px;
    color: var(--ink);
  }
  .speech-line.two {
    font-size: 28px;
    color: var(--r1);
    margin-top: 12px;
    transform: translateY(200px) scale(0.18);
  }
  .scene.started .speech-line.one {
    animation: word-emit 1.8s cubic-bezier(0.16, 1, 0.3, 1) 6.7s forwards;
  }
  .scene.started .speech-line.two {
    animation: word-emit-two 1.8s cubic-bezier(0.16, 1, 0.3, 1) 8.5s forwards,
               rainbow-text 6s linear 10.3s infinite;
  }
  @keyframes word-emit {
    0%   { opacity: 0; transform: translateY(260px) scale(0.18); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes word-emit-two {
    0%   { opacity: 0; transform: translateY(200px) scale(0.18); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes rainbow-text {
    0%   { color: var(--r1); } 16% { color: var(--r2); } 33% { color: var(--r3); }
    50%  { color: var(--r4); } 66% { color: var(--r5); } 83% { color: var(--r6); }
    100% { color: var(--r1); }
  }

  /* Cal zone — middle. Extra bottom padding gives Cal room to pulse without touching CTA. */
  .cal-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
    min-height: 0;
    padding: 12px 0 40px 0;  /* was 12px 0 — added 28px bottom buffer */
  }
  .cal-wrap {
    width: 300px;
    height: 358px;
    opacity: 0;
    transform: scale(0.25);
    transform-origin: center;
  }
  /* Let the SVG paint outside its viewBox so Cal's pulse-expanded bottom doesn't get clipped */
  .cal-wrap svg { overflow: visible; }
  /* Pulse is applied to the FACE group only, NOT the keypad — digits never scale, never jitter, never smudge.
     transform-origin centre-middle of the face group so scale expands equally up + down (no bottom crop). */
  .cal-face { transform-origin: 130px 161px; transform-box: view-box; }
  .scene.started .cal-face {
    animation: cal-pulse 6s ease-in-out 10.7s infinite;
  }
  .scene.started .cal-wrap {
    animation:
      cal-materialise 2.0s cubic-bezier(0.16, 0.84, 0.4, 1) 3.8s forwards;
    /* cal-pulse moved off .cal-wrap onto .cal-face to exclude the keypad */
  }
  @keyframes cal-materialise {
    0%   { opacity: 0; transform: scale(0.25); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes cal-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.03); }
  }

  .cal-shadow {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 16px;
    background: radial-gradient(ellipse at center, rgba(26,24,21,0.18) 0%, rgba(26,24,21,0) 70%);
    opacity: 0;
    z-index: 1;
  }
  :root[data-theme="dark"] .cal-shadow,
  :root:not([data-theme="light"]) .cal-shadow {
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 70%);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .cal-shadow {
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 70%);
    }
  }
  .scene.started .cal-shadow {
    animation: fade-in 1.5s 4.7s forwards, shadow-pulse 3.6s ease-in-out 10.7s infinite;
  }
  @keyframes shadow-pulse {
    0%, 100% { width: 180px; opacity: 0.45; }
    50%      { width: 160px; opacity: 0.3; }
  }

  /* Type + CTA zone — bottom. margin-top pushes CTA away from Cal's shadow. */
  .bottom-zone {
    width: 100%;
    text-align: center;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 16px;
  }
  .type-wrap {
    font-family: 'Lexend';
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
    line-height: 1.3;
    min-height: 24px;
  }
  .type-line {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    width: 0;
    vertical-align: middle;
  }
  .scene.started .type-line {
    animation: typewriter 1.5s steps(16, end) 10.7s forwards;
  }
  @keyframes typewriter {
    0%   { width: 0; }
    100% { width: 16ch; }
  }
  .fun-word {
    display: inline-block;
    font-family: 'Fredericka the Great', serif;
    font-size: 24px;
    color: var(--r1);
    vertical-align: middle;
    margin-left: 4px;
    opacity: 0;
    transform-origin: center;
    line-height: 1;
  }
  .scene.started .fun-word {
    animation:
      fade-in 0.5s 12.3s forwards,
      heartbeat 2.4s ease-in-out 12.8s infinite,
      rainbow-text 6s linear 13.0s infinite;
  }

  .eye { transform-box: fill-box; transform-origin: center; }
  /* SINGLE clear wink at 8.7s (right after "Hi, I'm Cal" lands).
     Wink closes tight and HOLDS for ~1s — unmistakable as a one-eye gesture, not a blink.
     Blink cycle delayed to 17s so the wink has clear solo time. */
  .scene.started .eye-right { animation: blink 4.8s 17s infinite; }
  .scene.started .eye-left  { animation: wink-hold 2.2s 8.7s forwards, blink 4.8s 17s infinite; }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95%, 97%      { transform: scaleY(0.12); }
  }
  /* wink-hold over 2.2s: close fast, HOLD closed for ~1s, open fast. Unambiguous wink. */
  @keyframes wink-hold {
    0%        { transform: scaleY(1); }       /* 0.0s — open */
    15%       { transform: scaleY(0.05); }    /* 0.33s — fully closed */
    60%       { transform: scaleY(0.05); }    /* 1.32s — still closed (1s hold) */
    80%, 100% { transform: scaleY(1); }       /* 1.76s — open and stay */
  }

  .mouth-open { opacity: 0; }
  .scene.started .mouth-closed {
    animation: lip-cycle-closed 1.5s ease-in-out 6.7s forwards,
               lip-cycle-closed 1.5s ease-in-out 8.5s forwards;
  }
  .scene.started .mouth-open {
    animation: lip-cycle-open 1.5s ease-in-out 6.7s forwards,
               lip-cycle-open 1.5s ease-in-out 8.5s forwards;
  }
  @keyframes lip-cycle-closed {
    0%, 100% { opacity: 1; }
    15%, 40%, 65% { opacity: 0; }
    25%, 50%, 75% { opacity: 1; }
  }
  @keyframes lip-cycle-open {
    0%, 100% { opacity: 0; }
    15%, 40%, 65% { opacity: 1; }
    25%, 50%, 75% { opacity: 0; }
  }

  @keyframes rainbow {
    0%   { fill: var(--r1); } 16% { fill: var(--r2); } 33% { fill: var(--r3); }
    50%  { fill: var(--r4); } 66% { fill: var(--r5); } 83% { fill: var(--r6); }
    100% { fill: var(--r1); }
  }
  .btn-rainbow { animation: rainbow 15s linear infinite; }
  .btn-rainbow.d1 { animation-delay: -0.4s; }
  .btn-rainbow.d2 { animation-delay: -0.8s; }
  .btn-rainbow.d3 { animation-delay: -1.2s; }
  .btn-rainbow.d4 { animation-delay: -1.6s; }
  .btn-rainbow.d5 { animation-delay: -2.0s; }
  .btn-rainbow.d6 { animation-delay: -2.4s; }
  .btn-rainbow.d7 { animation-delay: -2.8s; }
  .btn-rainbow.d8 { animation-delay: -3.2s; }

  .confetti {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    opacity: 0;
    z-index: 6;
  }
  .scene.started .confetti.c1 { background: var(--r1); top: 50%; left: 40%; animation: confetti-burst 1.2s ease-out 12.6s forwards; --dx: -40px; }
  .scene.started .confetti.c2 { background: var(--r2); top: 48%; left: 52%; animation: confetti-burst 1.2s ease-out 12.65s forwards; --dx: -15px; }
  .scene.started .confetti.c3 { background: var(--r3); top: 52%; left: 60%; animation: confetti-burst 1.2s ease-out 12.7s forwards; --dx: 30px; }
  .scene.started .confetti.c4 { background: var(--r4); top: 54%; left: 44%; animation: confetti-burst 1.2s ease-out 12.75s forwards; --dx: -25px; }
  .scene.started .confetti.c5 { background: var(--r5); top: 50%; left: 56%; animation: confetti-burst 1.2s ease-out 12.8s forwards; --dx: 20px; }
  .scene.started .confetti.c6 { background: var(--r6); top: 46%; left: 48%; animation: confetti-burst 1.2s ease-out 12.85s forwards; --dx: 8px; }
  @keyframes confetti-burst {
    0%   { opacity: 1; transform: translate(0,0) rotate(0); }
    100% { opacity: 0; transform: translate(var(--dx), -80px) rotate(360deg); }
  }

  .cta {
    background: var(--ink);
    color: var(--bg);
    padding: 10px 22px;
    border-radius: 22px;
    font-family: 'Lexend';
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
    z-index: 5;
    opacity: 0;
    cursor: pointer;
    pointer-events: auto;
    flex-shrink: 0;
  }
  .scene.started .cta {
    animation: fade-in 0.8s 13.3s forwards;
  }

  /* Responsive scaling — phone stays at 390x760, scaled to fit viewport */
  @media (max-height: 900px) {
    :root { --scene-scale: 0.95; }
  }
  @media (max-height: 820px) {
    :root { --scene-scale: 0.88; }
  }
  @media (max-height: 760px) {
    :root { --scene-scale: 0.82; }
  }
  @media (max-height: 700px) {
    :root { --scene-scale: 0.75; }
  }
  @media (max-height: 640px) {
    :root { --scene-scale: 0.68; }
  }
  @media (max-width: 420px) and (max-height: 900px) {
    :root { --scene-scale: 0.88; }
  }
  @media (max-width: 420px) and (max-height: 820px) {
    :root { --scene-scale: 0.82; }
  }
  @media (max-width: 420px) and (max-height: 760px) {
    :root { --scene-scale: 0.76; }
  }

  /* Tablet — let the phone be bigger, give it room */
  @media (min-width: 768px) and (min-height: 900px) {
    :root { --scene-scale: 1; }
    .phone-stage { padding: 40px; }
  }

  /* Desktop — phone centered with generous margins */
  @media (min-width: 1200px) {
    :root { --scene-scale: 1; }
    .phone-stage { padding: 60px; }
    .top-bar { padding: 16px 40px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .splash-curtain { display: none; }
    .cal-wrap { opacity: 1; transform: scale(1); }
    .speech-line { opacity: 1; transform: translateY(0) scale(1); }
    .type-line { width: 16ch; }
    .fun-word, .cta, .cal-shadow { opacity: 1; }
  }
</style>
</head>

<script>
  // Allow forcing theme via ?theme=light or ?theme=dark (used by the compare page)
  (function () {
    const params = new URLSearchParams(window.location.search);
    const forceTheme = params.get('theme');
    if (forceTheme === 'light' || forceTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', forceTheme);
    }
  })();

  // Splash is b/w (light/dark mode inverse) — no rotating palette.
  // Brand energy comes from the rainbow "FreelanceCal" wordmark (CSS animation)
  // and an inverse CTA pill.

  function enterApp(e) {
    const scene = document.getElementById('scene');
    if (scene && !scene.classList.contains('started')) {
      scene.classList.add('started');
      console.log('[FreelanceCal v52] scene started');
    }
  }

  // Normal splash flow — user presses CTA or curtain, scene starts, curtain slides up
  document.addEventListener('DOMContentLoaded', function () {
    const curtain = document.getElementById('splashCurtain');
    if (curtain) {
      curtain.addEventListener('click', enterApp);
      curtain.addEventListener('touchend', function (e) { enterApp(e); }, { passive: true });
    }
  });

  function replay() {
    const scene = document.getElementById('scene');
    const clone = scene.cloneNode(true);
    clone.classList.remove('started');
    scene.parentNode.replaceChild(clone, scene);
    // Re-attach splash listeners since DOM was replaced
    const newCurtain = clone.querySelector('#splashCurtain') || document.getElementById('splashCurtain');
    if (newCurtain) {
      newCurtain.addEventListener('click', enterApp);
      newCurtain.addEventListener('touchend', function (e) { enterApp(e); }, { passive: true });
    }
  }

  function toggleTheme() {
    const root = document.documentElement;
    const current = root.getAttribute('data-theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let next;
    if (!current) {
      // No override — toggle opposite of system
      next = systemDark ? 'light' : 'dark';
    } else if (current === 'dark') {
      next = 'light';
    } else {
      next = 'dark';
    }
    root.setAttribute('data-theme', next);
  }
</script>
