<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splash — light + dark side by side</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lexend', sans-serif;
    background: #1A1815;
    color: #FFFFFF;
    padding: 24px;
    min-height: 100vh;
  }
  .page-title {
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    text-align: center;
    margin-bottom: 6px;
  }
  .page-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .panel-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 12px;
  }
  iframe {
    width: 440px;
    height: 820px;
    border: 0;
    border-radius: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .replay {
    margin-top: 14px;
    background: transparent;
    color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'Lexend';
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .replay:hover { background: rgba(255,255,255,0.1); }

  @media (max-width: 960px) {
    .grid { grid-template-columns: 1fr; }
    iframe { width: 100%; max-width: 440px; }
  }
</style>
</head>
<body>

<div class="page-title">Splash landing — light vs dark mode</div>
<div class="page-sub">Both iframes auto-play the entrance. Click "Replay both" to restart in sync.</div>

<div class="grid">
  <div class="panel">
    <div class="panel-label">Light mode</div>
    <iframe id="frame-light" src="phone-v26.html?theme=light" title="Splash light mode"></iframe>
  </div>
  <div class="panel">
    <div class="panel-label">Dark mode</div>
    <iframe id="frame-dark" src="phone-v26.html?theme=dark" title="Splash dark mode"></iframe>
  </div>
</div>

<div style="text-align: center; margin-top: 20px;">
  <button class="replay" onclick="replayBoth()">Replay both in sync</button>
</div>

<script>
  function replayBoth() {
    const light = document.getElementById('frame-light');
    const dark = document.getElementById('frame-dark');
    if (light) light.src = 'phone-v26.html?theme=light&r=' + Date.now();
    if (dark)  dark.src  = 'phone-v26.html?theme=dark&r=' + Date.now();
  }
</script>
</body>
</html>
