<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cal page desktop compare — A / B / C</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --page-bg: #E8E8E6;
    --card-bg: #F7F7F6;
    --ink: #1A1815;
    --border: #D0D0CE;
  }
  :root[data-theme="dark"] {
    --page-bg: #1A1A1E;
    --card-bg: #26262A;
    --ink: #FFFFFF;
    --border: #3A3A40;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --page-bg: #1A1A1E;
      --card-bg: #26262A;
      --ink: #FFFFFF;
      --border: #3A3A40;
    }
  }
  body {
    font-family: 'Lexend', sans-serif;
    background: var(--page-bg);
    color: var(--ink);
    padding: 16px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.2s, color 0.2s;
  }
  .theme-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 99;
    background: var(--ink);
    color: var(--page-bg);
    border: 1px solid var(--ink);
    width: 36px;
    height: 36px;
    border-radius: 18px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
  }
  .title-row {
    text-align: center;
    margin-bottom: 12px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    aspect-ratio: 16 / 10;
  }
  .card .label {
    position: absolute;
    top: 10px;
    left: 14px;
    background: var(--ink);
    color: #FFF;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 12px;
    z-index: 20;
  }
  .card .subtitle {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    opacity: 0.55;
    z-index: 20;
  }

  .speech-one {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.05;
  }
  .speech-two {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-weight: 700;
    color: #8B5CF6;
    line-height: 1.05;
    margin-top: 4px;
  }
  .cta-pill {
    background: var(--ink);
    color: var(--page-bg);
    padding: 10px 22px;
    border-radius: 22px;
    font-family: 'Lexend';
    font-weight: 500;
    font-size: 13px;
    display: inline-block;
    white-space: nowrap;
  }

  /* ===== OPTION A — centered, empty sides ===== */
  .opt-a .stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    padding: 44px 20px 28px;
  }
  .opt-a .speech-one { font-size: 30px; }
  .opt-a .speech-two { font-size: 20px; }
  .opt-a svg.cal { width: 100px; height: 120px; }

  /* ===== OPTION B — side-by-side: Cal left, speech + CTA right ===== */
  .opt-b .stage {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 48px 36px 28px;
    gap: 24px;
  }
  .opt-b .left { display: flex; justify-content: center; align-items: center; }
  .opt-b .right {
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    gap: 14px;
  }
  .opt-b .speech-one { font-size: 34px; }
  .opt-b .speech-two { font-size: 22px; }
  .opt-b svg.cal { width: 150px; height: 180px; }

  /* ===== OPTION C — ambient tint filling sides ===== */
  .opt-c .stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    padding: 44px 20px 28px;
    background:
      radial-gradient(circle at 0% 50%, rgba(233,78,119,0.18), transparent 40%),
      radial-gradient(circle at 100% 50%, rgba(139,92,246,0.18), transparent 40%),
      radial-gradient(circle at 50% 0%, rgba(16,185,129,0.12), transparent 40%);
  }
  .opt-c .speech-one { font-size: 30px; }
  .opt-c .speech-two { font-size: 20px; }
  .opt-c svg.cal { width: 100px; height: 120px; }
  .opt-c .dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    opacity: 0.45;
    pointer-events: none;
  }

  /* Dark mode: flip Cal SVG stroke + fill */
  :root[data-theme="dark"] svg path[stroke="#1A1815"],
  :root[data-theme="dark"] svg rect[stroke="#1A1815"] { stroke: #FFFFFF; }
  :root[data-theme="dark"] svg path[fill="#F7F7F6"] { fill: #26262A; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) svg path[stroke="#1A1815"],
    :root:not([data-theme="light"]) svg rect[stroke="#1A1815"] { stroke: #FFFFFF; }
    :root:not([data-theme="light"]) svg path[fill="#F7F7F6"] { fill: #26262A; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">☼</button>

<div class="title-row">Cal page on desktop — layout compare</div>

<div class="grid">

  <!-- OPTION A — centered, empty sides -->
  <div class="card opt-a">
    <div class="label">A</div>
    <div class="subtitle">centered · empty sides</div>
    <div class="stage">
      <div class="speech-one">Hi, I'm Cal.</div>
      <div class="speech-two">FreelanceCal.</div>
      <svg class="cal" viewBox="0 0 260 310" xmlns="http://www.w3.org/2000/svg">
        <path stroke="#1A1815" stroke-width="3" fill="#F7F7F6" stroke-linejoin="round" d="M44 38 Q38 16 62 12 L198 12 Q222 16 216 38 L216 290 Q222 310 198 310 L62 310 Q38 310 44 290 Z"/>
        <rect x="70" y="40" width="120" height="96" rx="8" stroke="#1A1815" stroke-width="2.8" fill="none"/>
        <path stroke="#1A1815" stroke-width="3" fill="none" stroke-linecap="round" d="M90 100 Q110 120 130 105 Q150 120 170 100"/>
        <circle cx="100" cy="180" r="12" fill="#E94E77"/><circle cx="130" cy="180" r="12" fill="#F59E0B"/><circle cx="160" cy="180" r="12" fill="#FBBF24"/>
        <circle cx="100" cy="215" r="12" fill="#10B981"/><circle cx="130" cy="215" r="12" fill="#0EA5E9"/><circle cx="160" cy="215" r="12" fill="#8B5CF6"/>
      </svg>
      <div class="cta-pill">Let's play →</div>
    </div>
  </div>

  <!-- OPTION B — side-by-side -->
  <div class="card opt-b">
    <div class="label">B</div>
    <div class="subtitle">Cal left · speech right</div>
    <div class="stage">
      <div class="left">
        <svg class="cal" viewBox="0 0 260 310" xmlns="http://www.w3.org/2000/svg">
          <path stroke="#1A1815" stroke-width="3" fill="#F7F7F6" stroke-linejoin="round" d="M44 38 Q38 16 62 12 L198 12 Q222 16 216 38 L216 290 Q222 310 198 310 L62 310 Q38 310 44 290 Z"/>
          <rect x="70" y="40" width="120" height="96" rx="8" stroke="#1A1815" stroke-width="2.8" fill="none"/>
          <path stroke="#1A1815" stroke-width="3" fill="none" stroke-linecap="round" d="M90 100 Q110 120 130 105 Q150 120 170 100"/>
          <circle cx="100" cy="180" r="12" fill="#E94E77"/><circle cx="130" cy="180" r="12" fill="#F59E0B"/><circle cx="160" cy="180" r="12" fill="#FBBF24"/>
          <circle cx="100" cy="215" r="12" fill="#10B981"/><circle cx="130" cy="215" r="12" fill="#0EA5E9"/><circle cx="160" cy="215" r="12" fill="#8B5CF6"/>
        </svg>
      </div>
      <div class="right">
        <div class="speech-one">Hi, I'm Cal.</div>
        <div class="speech-two">FreelanceCal.</div>
        <div class="cta-pill" style="margin-top:8px;">Let's play →</div>
      </div>
    </div>
  </div>

  <!-- OPTION C — ambient rainbow -->
  <div class="card opt-c">
    <div class="label">C</div>
    <div class="subtitle">ambient tint · filled sides</div>
    <div class="stage">
      <div class="dot" style="background:#E94E77;top:20%;left:8%;"></div>
      <div class="dot" style="background:#F59E0B;top:40%;left:5%;"></div>
      <div class="dot" style="background:#FBBF24;top:65%;left:10%;"></div>
      <div class="dot" style="background:#10B981;top:25%;right:8%;"></div>
      <div class="dot" style="background:#0EA5E9;top:50%;right:6%;"></div>
      <div class="dot" style="background:#8B5CF6;top:72%;right:10%;"></div>
      <div class="speech-one">Hi, I'm Cal.</div>
      <div class="speech-two">FreelanceCal.</div>
      <svg class="cal" viewBox="0 0 260 310" xmlns="http://www.w3.org/2000/svg">
        <path stroke="#1A1815" stroke-width="3" fill="#F7F7F6" stroke-linejoin="round" d="M44 38 Q38 16 62 12 L198 12 Q222 16 216 38 L216 290 Q222 310 198 310 L62 310 Q38 310 44 290 Z"/>
        <rect x="70" y="40" width="120" height="96" rx="8" stroke="#1A1815" stroke-width="2.8" fill="none"/>
        <path stroke="#1A1815" stroke-width="3" fill="none" stroke-linecap="round" d="M90 100 Q110 120 130 105 Q150 120 170 100"/>
        <circle cx="100" cy="180" r="12" fill="#E94E77"/><circle cx="130" cy="180" r="12" fill="#F59E0B"/><circle cx="160" cy="180" r="12" fill="#FBBF24"/>
        <circle cx="100" cy="215" r="12" fill="#10B981"/><circle cx="130" cy="215" r="12" fill="#0EA5E9"/><circle cx="160" cy="215" r="12" fill="#8B5CF6"/>
      </svg>
      <div class="cta-pill">Let's play →</div>
    </div>
  </div>

</div>

</body>
</html>
