<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cal · Tap Fun to enter · v49</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F7F6;
    --ink: #1A1815;
    --ink-soft: rgba(26, 24, 21, 0.6);
    --ink-faint: rgba(26, 24, 21, 0.4);
    --card: #FFFFFF;
    --divider: rgba(26, 24, 21, 0.1);
    --splash: #E94E77;
    --r1: #E94E77; --r2: #F59E0B; --r3: #FBBF24;
    --r4: #10B981; --r5: #0EA5E9; --r6: #8B5CF6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Lexend', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--divider);
  }
  .top-bar .title {
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .btn {
    background: var(--ink); color: var(--bg);
    border: none; padding: 8px 16px; border-radius: 20px;
    font-family: 'Lexend'; font-size: 12px; font-weight: 500;
    cursor: pointer;
  }

  .phone-stage {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
  }
  .phone {
    width: 390px; height: 760px;
    max-height: calc(100vh - 140px);
    background: var(--bg);
    border: 12px solid var(--ink);
    border-radius: 48px;
    position: relative; overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.18);
  }
  .notch {
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 24px;
    background: var(--ink);
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    z-index: 10;
  }

  .scene { position: absolute; inset: 0; overflow: hidden; }

  /* ===== SPLASH — plays on page load ===== */
  .splash-curtain {
    position: absolute; top: 0; left: 0; right: 0;
    height: 100%;
    background: var(--splash);
    z-index: 8;
  }

  .splash-content {
    position: absolute;
    top: 45%;
    left: 0; right: 0;
    text-align: center;
    transform: translateY(-50%);
  }
  .splash-wordmark {
    font-family: 'Fredericka the Great', serif;
    font-size: 52px;
    color: #FFFFFF;
    opacity: 0;
    animation: soft-in 0.8s ease-out 0.6s forwards;
  }
  .splash-tagline {
    margin-top: 14px;
    font-family: 'Lexend';
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.02em;
    white-space: nowrap;
    opacity: 0;
    animation: fade-in 0.4s 1.2s forwards;
  }
  .splash-type {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    width: 0;
    vertical-align: middle;
    animation: type-splash 1.5s steps(16, end) 1.4s forwards;
  }
  @keyframes type-splash {
    0%   { width: 0; }
    100% { width: 16ch; }
  }
  /* Fun — just emphasised tagline text, not a button */
  .splash-tagline .fun-heart {
    display: inline-block;
    font-family: 'Fredericka the Great', serif;
    font-style: normal;
    font-size: 28px;
    color: #FFFFFF;
    margin-left: 3px;
    vertical-align: middle;
    transform-origin: center;
    opacity: 0;
    animation: fade-in 0.4s 3.0s forwards, heartbeat 2.4s ease-in-out 3.6s infinite;
  }
  @keyframes soft-in {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }
  @keyframes fade-in { to { opacity: 1; } }
  @keyframes fade-out { to { opacity: 0; } }

  /* "Ready for fun?" button — this is the actual CTA */
  .splash-cta {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    font-family: 'Lexend';
    font-size: 14px;
    font-weight: 500;
    color: #FFFFFF;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(6px);
    padding: 14px 30px;
    border-radius: 26px;
    border: 1.5px solid rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
    white-space: nowrap;
    cursor: pointer;
    opacity: 0;
    animation: splash-cta-in 0.6s ease-out 4.0s forwards, splash-cta-pulse 3s ease-in-out 5.0s infinite;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .splash-cta:hover { background: rgba(255,255,255,0.28); }
  .splash-cta:active { transform: translateX(-50%) scale(0.94); }
  @keyframes splash-cta-in {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.85); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
  }
  @keyframes splash-cta-pulse {
    0%, 100% { transform: translateX(-50%) scale(1); background: rgba(255,255,255,0.18); }
    50%      { transform: translateX(-50%) scale(1.06); background: rgba(255,255,255,0.3); }
  }

  /* ===== EVERYTHING BELOW ONLY PLAYS AFTER USER CLICKS FUN =====
     Triggered by .scene.started class (click time = T=0 for all downstream delays) */

  /* Curtain slide */
  .scene.started .splash-curtain {
    animation: curtain-up 3.5s cubic-bezier(0.55, 0, 0.35, 1) 0s forwards;
  }
  @keyframes curtain-up {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-120%); }
  }

  /* Charcoal wordmark + tagline removed — brand was showing up 3 times, redundant */

  /* Speech emerging from mouth */
  .speech-line {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Fredericka the Great', serif;
    font-size: 40px;
    z-index: 5;
    opacity: 0;
    transform-origin: center;
    letter-spacing: 0.01em;
    transform: translateY(330px) scale(0.18);
  }
  .speech-line.one  { top: 80px; }
  .speech-line.two  { top: 140px; color: var(--r1); transform: translateY(270px) scale(0.18); }
  .scene.started .speech-line.one {
    animation: word-emit 1.8s cubic-bezier(0.16, 1, 0.3, 1) 6.7s forwards;
  }
  .scene.started .speech-line.two {
    animation: word-emit-two 1.8s cubic-bezier(0.16, 1, 0.3, 1) 8.5s forwards,
               rainbow-text 6s linear 10.3s infinite;
  }
  @keyframes word-emit {
    0%   { opacity: 0; transform: translateY(330px) scale(0.18); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes word-emit-two {
    0%   { opacity: 0; transform: translateY(270px) scale(0.18); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes rainbow-text {
    0%   { color: var(--r1); } 16% { color: var(--r2); } 33% { color: var(--r3); }
    50%  { color: var(--r4); } 66% { color: var(--r5); } 83% { color: var(--r6); }
    100% { color: var(--r1); }
  }

  /* Typewriter tagline + Fun heartbeat at bottom */
  .type-wrap {
    position: absolute;
    bottom: 110px;
    left: 0; right: 0;
    text-align: center;
    z-index: 5;
    font-family: 'Lexend';
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .type-line {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    width: 0;
    vertical-align: middle;
  }
  .scene.started .type-line {
    animation: typewriter 1.5s steps(16, end) 10.7s forwards;
  }
  @keyframes typewriter {
    0%   { width: 0; }
    100% { width: 16ch; }
  }
  .fun-word {
    display: inline-block;
    font-family: 'Fredericka the Great', serif;
    font-size: 24px;
    color: var(--r1);
    vertical-align: middle;
    margin-left: 4px;
    opacity: 0;
    transform-origin: center;
  }
  .scene.started .fun-word {
    animation:
      fade-in 0.5s 12.3s forwards,
      heartbeat 2.4s ease-in-out 12.8s infinite,
      rainbow-text 6s linear 13.0s infinite;
  }

  /* Cal */
  .cal-wrap {
    position: absolute;
    bottom: 180px;
    left: 50%;
    width: 260px;
    height: 310px;
    transform: translateX(-50%) scale(0.25);
    opacity: 0;
    z-index: 3;
  }
  .scene.started .cal-wrap {
    animation:
      cal-materialise 2.0s cubic-bezier(0.16, 0.84, 0.4, 1) 3.8s forwards,
      cal-idle 3.6s ease-in-out 10.7s infinite;
  }
  @keyframes cal-materialise {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.25); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
  }
  @keyframes cal-idle {
    0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
    50%      { transform: translateX(-50%) translateY(-6px) scale(1.01); }
  }

  .eye { transform-box: fill-box; transform-origin: center; }
  .scene.started .eye-right { animation: blink 4.2s 12.7s infinite; }
  .scene.started .eye-left  { animation: wink-once 0.55s 6.1s forwards, blink 4.2s 12.7s infinite; }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95%, 97%      { transform: scaleY(0.12); }
  }
  @keyframes wink-once {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(0.1); }
  }

  /* Mouth lip-sync — two cycles, one per speech line */
  .mouth-open { opacity: 0; }
  .scene.started .mouth-closed {
    animation: lip-cycle-closed 1.5s ease-in-out 6.7s forwards,
               lip-cycle-closed 1.5s ease-in-out 8.5s forwards;
  }
  .scene.started .mouth-open {
    animation: lip-cycle-open 1.5s ease-in-out 6.7s forwards,
               lip-cycle-open 1.5s ease-in-out 8.5s forwards;
  }
  @keyframes lip-cycle-closed {
    0%, 100% { opacity: 1; }
    15%, 40%, 65% { opacity: 0; }
    25%, 50%, 75% { opacity: 1; }
  }
  @keyframes lip-cycle-open {
    0%, 100% { opacity: 0; }
    15%, 40%, 65% { opacity: 1; }
    25%, 50%, 75% { opacity: 0; }
  }

  /* Rainbow button cycle */
  @keyframes rainbow {
    0%   { fill: var(--r1); } 16% { fill: var(--r2); } 33% { fill: var(--r3); }
    50%  { fill: var(--r4); } 66% { fill: var(--r5); } 83% { fill: var(--r6); }
    100% { fill: var(--r1); }
  }
  .btn-rainbow { animation: rainbow 5s linear infinite; }
  .btn-rainbow.d1 { animation-delay: -0.4s; }
  .btn-rainbow.d2 { animation-delay: -0.8s; }
  .btn-rainbow.d3 { animation-delay: -1.2s; }
  .btn-rainbow.d4 { animation-delay: -1.6s; }
  .btn-rainbow.d5 { animation-delay: -2.0s; }
  .btn-rainbow.d6 { animation-delay: -2.4s; }
  .btn-rainbow.d7 { animation-delay: -2.8s; }
  .btn-rainbow.d8 { animation-delay: -3.2s; }

  .cal-shadow {
    position: absolute;
    bottom: 170px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 20px;
    background: radial-gradient(ellipse at center, rgba(26,24,21,0.18) 0%, rgba(26,24,21,0) 70%);
    opacity: 0;
    z-index: 2;
  }
  .scene.started .cal-shadow {
    animation: fade-in 1.5s 4.7s forwards, shadow-pulse 3.6s ease-in-out 10.7s infinite;
  }
  @keyframes shadow-pulse {
    0%, 100% { width: 180px; opacity: 0.45; }
    50%      { width: 160px; opacity: 0.3; }
  }

  /* Confetti — fires after typewriter completes */
  .confetti {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    opacity: 0;
    z-index: 6;
  }
  .scene.started .confetti.c1 { background: var(--r1); top: 50%; left: 40%; animation: confetti-burst 1.2s ease-out 12.6s forwards; --dx: -40px; }
  .scene.started .confetti.c2 { background: var(--r2); top: 48%; left: 52%; animation: confetti-burst 1.2s ease-out 12.65s forwards; --dx: -15px; }
  .scene.started .confetti.c3 { background: var(--r3); top: 52%; left: 60%; animation: confetti-burst 1.2s ease-out 12.7s forwards; --dx: 30px; }
  .scene.started .confetti.c4 { background: var(--r4); top: 54%; left: 44%; animation: confetti-burst 1.2s ease-out 12.75s forwards; --dx: -25px; }
  .scene.started .confetti.c5 { background: var(--r5); top: 50%; left: 56%; animation: confetti-burst 1.2s ease-out 12.8s forwards; --dx: 20px; }
  .scene.started .confetti.c6 { background: var(--r6); top: 46%; left: 48%; animation: confetti-burst 1.2s ease-out 12.85s forwards; --dx: 8px; }
  @keyframes confetti-burst {
    0%   { opacity: 1; transform: translate(0,0) rotate(0); }
    100% { opacity: 0; transform: translate(var(--dx), -80px) rotate(360deg); }
  }

  /* Final CTA */
  .cta {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--bg);
    padding: 10px 22px;
    border-radius: 22px;
    font-family: 'Lexend';
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
    z-index: 5;
    opacity: 0;
    cursor: pointer;
  }
  .scene.started .cta {
    animation: fade-in 0.8s 13.3s forwards;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .splash-curtain { display: none; }
    .cal-wrap { opacity: 1; transform: translateX(-50%) scale(1); }
    .speech-line { opacity: 1; transform: translateY(0) scale(1); }
    .type-line { width: 16ch; }
    .fun-word, .wordmark, .tagline, .cta, .cal-shadow { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <div class="title">Cal · tap Fun to enter · v49</div>
    <button class="btn" onclick="replay()">Replay</button>
  </div>

  <div class="phone-stage">
    <div class="phone">
      <div class="notch"></div>
      <div class="scene" id="scene">

        <!-- SPLASH CURTAIN -->
        <div class="splash-curtain">
          <div class="splash-content">
            <div class="splash-wordmark">FreelanceCal</div>
            <div class="splash-tagline"><span class="splash-type">Less work, more </span><span class="fun-heart">Fun.</span></div>
          </div>
          <button class="splash-cta" onclick="enterApp(event)">Ready for fun?</button>
        </div>

        <div class="cal-shadow"></div>

        <!-- CAL -->
        <div class="cal-wrap">
          <svg viewBox="0 0 260 310" width="260" height="310" xmlns="http://www.w3.org/2000/svg">
            <path stroke="#1A1815" stroke-width="2.8" fill="#F7F7F6" stroke-linejoin="round"
                  d="M44 38 Q38 16 62 12 L198 12 Q222 16 216 38 L216 290 Q222 310 198 310 L62 310 Q38 310 44 290 Z"/>
            <rect fill="#F7F7F6" stroke="#1A1815" stroke-width="2.4" x="62" y="36" width="136" height="92" rx="14"/>
            <path stroke="#1A1815" stroke-width="2.6" stroke-linecap="round" fill="none" d="M82 64 Q98 54 114 64"/>
            <path stroke="#1A1815" stroke-width="2.6" stroke-linecap="round" fill="none" d="M146 64 Q162 54 178 64"/>
            <circle class="eye eye-left"  fill="#1A1815" cx="100" cy="84" r="9"/>
            <circle class="eye eye-right" fill="#1A1815" cx="160" cy="84" r="9"/>
            <circle fill="#F7F7F6" cx="102" cy="82" r="3"/>
            <circle fill="#F7F7F6" cx="162" cy="82" r="3"/>
            <path class="mouth-closed" stroke="#1A1815" stroke-width="2.8" fill="none" stroke-linecap="round" d="M112 108 Q130 120 148 108"/>
            <ellipse class="mouth-open" cx="130" cy="112" rx="10" ry="8" fill="#1A1815"/>

            <g><circle class="btn-rainbow"    cx="88"  cy="166" r="14"/><text x="88"  y="171" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">1</text></g>
            <g><circle class="btn-rainbow d1" cx="130" cy="166" r="14"/><text x="130" y="171" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">2</text></g>
            <g><circle class="btn-rainbow d2" cx="172" cy="166" r="14"/><text x="172" y="171" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">3</text></g>
            <g><circle class="btn-rainbow d3" cx="88"  cy="208" r="14"/><text x="88"  y="213" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">4</text></g>
            <g><circle class="btn-rainbow d4" cx="130" cy="208" r="14"/><text x="130" y="213" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">5</text></g>
            <g><circle class="btn-rainbow d5" cx="172" cy="208" r="14"/><text x="172" y="213" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">6</text></g>
            <g><circle class="btn-rainbow d6" cx="88"  cy="250" r="14"/><text x="88"  y="255" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">7</text></g>
            <g><circle class="btn-rainbow d7" cx="130" cy="250" r="14"/><text x="130" y="255" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">8</text></g>
            <g><circle class="btn-rainbow d8" cx="172" cy="250" r="14"/><text x="172" y="255" text-anchor="middle" fill="#F7F7F6" font-size="13" font-weight="700" font-family="Lexend">9</text></g>
          </svg>
        </div>

        <!-- SPEECH -->
        <div class="speech">
          <span class="speech-line one">Hi, I'm Cal.</span>
          <span class="speech-line two">FreelanceCal.</span>
        </div>

        <!-- TYPEWRITER TAGLINE -->
        <div class="type-wrap">
          <span class="type-line">Less work, more </span><span class="fun-word">Fun.</span>
        </div>

        <!-- CONFETTI -->
        <div class="confetti c1"></div>
        <div class="confetti c2"></div>
        <div class="confetti c3"></div>
        <div class="confetti c4"></div>
        <div class="confetti c5"></div>
        <div class="confetti c6"></div>

        <!-- FINAL CTA -->
        <div class="cta">Let's play →</div>

      </div>
    </div>
  </div>

<script>
  const palette = ['#E94E77', '#F59E0B', '#0EA5E9', '#8B5CF6', '#10B981', '#0D9488', '#EC4899'];
  const pick = palette[Math.floor(Math.random() * palette.length)];
  document.documentElement.style.setProperty('--splash', pick);

  function enterApp(e) {
    if (e) e.stopPropagation();
    document.getElementById('scene').classList.add('started');
  }

  function replay() {
    const scene = document.getElementById('scene');
    const clone = scene.cloneNode(true);
    clone.classList.remove('started');
    scene.parentNode.replaceChild(clone, scene);
    const newPick = palette[Math.floor(Math.random() * palette.length)];
    document.documentElement.style.setProperty('--splash', newPick);
  }
</script>
</body>
</html>
